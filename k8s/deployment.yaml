apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-churn-api
  labels:
    app: customer-churn-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-churn-api
  template:
    metadata:
      labels:
        app: customer-churn-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: api
        image: ayeswar/customer-churn-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow-service:5000" # Assuming MLflow is deployed in K8s
---
apiVersion: v1
kind: Service
metadata:
  name: customer-churn-api-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: customer-churn-api
